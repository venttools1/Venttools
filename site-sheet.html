<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>VentTools Site Instruction Sheet</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f4f7fa;font-family:Arial,sans-serif;color:#172033}
    .loading{box-sizing:border-box;max-width:760px;margin:0 auto;padding:48px 20px;text-align:center}
    .loading h1{font-size:22px;margin:0 0 10px}.loading p{margin:0 0 18px;color:#526071}
    .loading a{display:inline-block;padding:11px 16px;border-radius:8px;background:#075985;color:#fff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main class="loading">
    <h1>Preparing site instruction sheet…</h1>
    <p id="status">Loading the verified report.</p>
    <a id="backLink" href="index.html" hidden>Return to VentTools</a>
  </main>
  <script>
    (function(){
      const html=sessionStorage.getItem('venttoolsSiteSheetHtml');
      const returnUrl=sessionStorage.getItem('venttoolsSiteSheetReturn')||'index.html';
      if(!html){
        document.getElementById('status').textContent='No report data was found. Return to VentTools and create the sheet again.';
        const back=document.getElementById('backLink');
        back.href=returnUrl;
        back.hidden=false;
        return;
      }
      try{
        document.open();
        document.write(html.replace('onclick="window.close()"','onclick="history.back()"').replace('>Close</button>','>Back to VentTools</button>'));
        document.close();
      }catch(error){
        document.getElementById('status').textContent='This browser could not display the report. Return to VentTools and try again.';
        const back=document.getElementById('backLink');
        back.href=returnUrl;
        back.hidden=false;
      }
    })();
  </script>
</body>
</html>
