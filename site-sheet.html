<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>VentTools Site Instruction Sheet</title><style>html,body{margin:0;width:100%;height:100%;background:#fff}iframe{display:block;width:100%;height:100%;border:0}.error{font-family:Arial;padding:32px;text-align:center;color:#172033}.error a{display:inline-block;margin-top:16px;padding:12px 18px;background:#075a93;color:white;border-radius:10px;text-decoration:none;font-weight:700}</style></head><body><script>
const KEY='venttoolsProjectPackV1',HTML_PREFIX='venttoolsSiteSheetHtml:';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fallbackHtml(x){return `<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${esc(x.ref)} — VentTools Site Instruction</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial;color:#142234;background:#edf2f5}.bar{position:sticky;top:0;display:flex;gap:8px;padding:12px;background:#182b41}.bar button{flex:1;padding:12px;border:0;border-radius:9px;font-weight:800}.sheet{width:min(100%,900px);margin:auto;background:#fff;padding:24px}.head{border-bottom:4px solid #075f98;padding-bottom:14px}.head h1{margin:5px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.card{border:1px solid #d6e0e8;border-radius:12px;padding:14px}.card span{display:block;font-size:11px;text-transform:uppercase;color:#607080;font-weight:800}.card strong{display:block;margin-top:7px;font-size:18px}.hero{margin-top:16px;padding:20px;border:2px solid #78b9df;border-radius:14px;background:#eaf5fc;text-align:center}.hero strong{font-size:28px;color:#063e67}.wide{grid-column:1/-1}@media(max-width:600px){.sheet{padding:16px}.grid{grid-template-columns:1fr}.wide{grid-column:auto}}@media print{.bar{display:none}body{background:#fff}.sheet{width:auto;padding:0}}</style></head><body><div class="bar"><button onclick="window.print()">Print / Save PDF</button><button onclick="parent.location.href='pack-builder.html'">Back to Pack</button></div><main class="sheet"><header class="head"><small>VENTTOOLS ENGINEERING OUTPUT</small><h1>Site Instruction Sheet</h1><div>${esc(x.manufacturer)} ${esc(x.product)}</div></header><section class="grid"><div class="card"><span>Drawing reference / tag</span><strong>${esc(x.ref)}</strong></div><div class="card"><span>Location</span><strong>${esc(x.loc)}</strong></div><div class="hero wide"><span>Structural opening</span><br><strong>${esc(x.structuralOpening||x.opening)}</strong></div><div class="card"><span>Nominal damper</span><strong>${esc(x.damper)}</strong></div><div class="card"><span>Finished opening</span><strong>${esc(x.finishedOpening)}</strong></div><div class="card"><span>Opening bottom</span><strong>${esc(x.openingBottom)}</strong></div><div class="card"><span>Bottom cut-line offset</span><strong>${esc(x.bottomOffset)}</strong></div><div class="card wide"><span>Setting-out instruction</span><strong>${esc(x.settingAnswer)}</strong></div><div class="card wide"><span>Verified dimension chain</span><div>${esc(x.settingWarning)}</div></div><div class="card wide"><span>Source</span><div>${esc(x.source)}</div></div></section></main></body></html>`}
(function(){const id=new URLSearchParams(location.search).get('id');let entry=null,html=null;try{const list=JSON.parse(localStorage.getItem(KEY)||'[]');entry=Array.isArray(list)?list.find(x=>x.id===id):null;html=id?localStorage.getItem(HTML_PREFIX+id):null}catch(e){}if(!html&&entry)html=fallbackHtml(entry);if(!html)html=sessionStorage.getItem('venttoolsSiteSheetHtml');if(!html){document.body.innerHTML='<main class="error"><h1>Sheet not found</h1><p>Return to the project pack and open the damper again.</p><a href="pack-builder.html">Return to Project Pack</a></main>';return}const frame=document.createElement('iframe');frame.title='VentTools Site Instruction Sheet';frame.srcdoc=html.replace('onclick="window.close()"','onclick="parent.location.href=\'pack-builder.html\'"').replace('>Close</button>','>Back to Pack</button>');document.body.appendChild(frame)})();
</script></body></html>
